<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamSync - Pháp lý & Bảo mật</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-light: #FAFAF7; --brand-primary: #2D6A4F; --accent-time: #4A55A2; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: var(--bg-light); color: #333; text-align: center; padding-top: 8vh; }
        .box { max-width: 500px; margin: 0 auto; padding: 40px; border: 1px solid var(--brand-primary); background: #fff; }
        .app-logo { width: 90px; height: 90px; margin-bottom: 15px; } /* CSS cho Logo */
        h1 { color: var(--brand-primary); margin-bottom: 10px; font-size: 2rem; }
        .links { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        a { display: block; padding: 15px; background: rgba(45, 106, 79, 0.1); color: var(--brand-primary); text-decoration: none; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        a:hover { background: var(--brand-primary); color: #fff; }
    </style>
</head>
<body>
    <div class="box">
        <img src="fam_sync_app_icon_installed.svg" alt="FamSync Logo" class="app-logo">
        
        <h1>FamSync</h1>
        <p>Trung tâm Pháp lý & Bảo mật</p>
        <div class="links">
            <a href="privacy.html">Chính sách bảo mật (Privacy Policy)</a>
            <a href="terms.html">Điều khoản sử dụng (Terms of Service)</a>
        </div>
    </div>
</body>
</html>
